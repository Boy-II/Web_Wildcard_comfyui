version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wildcard_db
    environment:
      POSTGRES_DB: wildcard_db
      POSTGRES_USER: wildcard_user
      POSTGRES_PASSWORD: wildcard_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wildcard_user -d wildcard_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 使用宿主機原生 Ollama（更快、完整 GPU）
  # Windows PowerShell 執行：$env:OLLAMA_HOST = "0.0.0.0"; ollama serve
  # macOS/Linux 執行：OLLAMA_HOST=0.0.0.0 ollama serve

  web:
    build: .
    container_name: wildcard_web
    ports:
      - "9000:9000"
    volumes:
      # 應用程式（熱更新）
      - ./app.py:/app/app.py
      - ./webapp:/app/webapp
      - ./auto_categorizer.py:/app/auto_categorizer.py
      - ./init_categories.py:/app/init_categories.py
      - ./bulk_import.py:/app/bulk_import.py
      - ./migrate_flatten_categories.py:/app/migrate_flatten_categories.py
      - ./migrate_content_to_text.py:/app/migrate_content_to_text.py
      # 資料與日誌持久化
      - ./data:/app/data
      - ./logs:/app/logs
      # ComfyUI Wildcard 目錄（依實際路徑修改）
      - ${COMFYUI_WILDCARD_PATH:-./comfy_wildcard}:/app/comfy_wildcard
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://wildcard_user:wildcard_pass@db:5432/wildcard_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
