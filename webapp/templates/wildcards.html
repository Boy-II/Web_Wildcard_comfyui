{% extends "base.html" %}

{% block title %}Wildcard 管理 - Wildcard 管理系統{% endblock %}

{% block extra_css %}
<style>
    #cat-list { max-height: calc(100vh - 280px); overflow-y: auto; }
    #cat-list .cat-item { cursor: pointer; padding: 6px 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
    #cat-list .cat-item:hover { background: #f0f0f0; }
    #cat-list .cat-item.active { background: #0d6efd; color: #fff; }
    #cat-list .cat-item.active .badge { background: rgba(255,255,255,0.3) !important; color: #fff; }
    #cat-list .cat-actions { display: none; gap: 4px; }
    #cat-list .cat-item:hover .cat-actions,
    #cat-list .cat-item.active .cat-actions { display: flex; }
    .wildcard-row td { vertical-align: middle; }
    .translation-status { font-size: 0.8em; }
    #wc-table th, #wc-table td { white-space: nowrap; }
    #wc-table td.content-cell { white-space: normal; max-width: 300px; }
</style>
{% endblock %}

{% block content %}
<div class="row g-0">
    <!-- LEFT: Category Panel -->
    <div class="col-12 col-md-3 border-end pe-2">
        <div class="d-flex align-items-center justify-content-between mb-2 mt-1">
            <h6 class="mb-0 fw-bold"><i class="bi bi-folder"></i> 分類</h6>
            <button class="btn btn-sm btn-outline-primary" id="btn-new-cat" title="新增分類">
                <i class="bi bi-plus-lg"></i>
            </button>
        </div>
        <!-- Inline new category input -->
        <div id="new-cat-form" class="mb-2" style="display:none;">
            <div class="input-group input-group-sm">
                <input type="text" class="form-control" id="new-cat-name" placeholder="分類名稱 (英文, 用_連接)">
                <button class="btn btn-primary" id="btn-save-cat"><i class="bi bi-check-lg"></i></button>
                <button class="btn btn-secondary" id="btn-cancel-cat"><i class="bi bi-x-lg"></i></button>
            </div>
            <input type="text" class="form-control form-control-sm mt-1" id="new-cat-display" placeholder="顯示名稱">
        </div>
        <!-- Search categories -->
        <div class="mb-2">
            <input type="text" class="form-control form-control-sm" id="cat-search" placeholder="搜尋分類...">
        </div>
        <!-- Category list -->
        <div id="cat-list"></div>
        <!-- Selected category actions -->
        <div id="cat-selected-actions" class="mt-2 border-top pt-2" style="display:none;">
            <div class="small text-muted mb-1">選中：<span id="cat-selected-name" class="fw-bold"></span></div>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-secondary" id="btn-rename-cat"><i class="bi bi-pencil"></i> 改名</button>
                <button class="btn btn-sm btn-outline-danger" id="btn-delete-cat"><i class="bi bi-trash"></i> 刪除</button>
            </div>
        </div>
    </div>

    <!-- RIGHT: Wildcards Panel -->
    <div class="col-12 col-md-9 ps-3">
        <!-- Toolbar -->
        <div class="d-flex flex-wrap gap-2 align-items-center mb-3 mt-1">
            <div class="flex-grow-1" style="min-width:200px; max-width:350px;">
                <div class="input-group input-group-sm">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" id="wc-search" placeholder="搜尋 Wildcard...">
                </div>
            </div>
            <select class="form-select form-select-sm" id="wc-status-filter" style="width:auto;">
                <option value="">全部狀態</option>
                <option value="true">啟用中</option>
                <option value="false">停用中</option>
            </select>
            <div class="dropdown">
                <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
                    批量操作
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#" id="bulk-enable"><i class="bi bi-check-circle text-success"></i> 批量啟用</a></li>
                    <li><a class="dropdown-item" href="#" id="bulk-disable"><i class="bi bi-x-circle text-warning"></i> 批量停用</a></li>
                    <li><a class="dropdown-item" href="#" id="bulk-translate"><i class="bi bi-translate text-primary"></i> 批量翻譯</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="#" id="bulk-delete"><i class="bi bi-trash"></i> 批量刪除</a></li>
                </ul>
            </div>
        </div>

        <!-- Select-all + count row -->
        <div class="d-flex align-items-center gap-3 mb-2 small text-muted">
            <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="select-all">
                <label class="form-check-label" for="select-all">全選</label>
            </div>
            <span id="wc-count-label">共 0 筆</span>
            <span id="selected-count-label" class="text-primary fw-bold" style="display:none;"></span>
        </div>

        <!-- Wildcards Table -->
        <div class="table-responsive">
            <table class="table table-sm table-hover" id="wc-table">
                <thead class="table-light">
                    <tr>
                        <th style="width:32px;"></th>
                        <th>英文</th>
                        <th>中文翻譯</th>
                        <th style="width:80px;">狀態</th>
                        <th style="width:60px;"></th>
                    </tr>
                </thead>
                <tbody id="wc-tbody">
                    <tr><td colspan="5" class="text-center text-muted py-4">請從左側選擇分類</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <nav id="wc-pagination" aria-label="Wildcard 分頁"></nav>
    </div>
</div>

<!-- Edit Wildcard Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editModalTitle">編輯 Wildcard</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">英文內容</label>
                    <input type="text" class="form-control" id="edit-content">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">中文翻譯</label>
                    <input type="text" class="form-control" id="edit-content-zh">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary" id="btn-save-edit">儲存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    // --- State ---
    let selectedCategoryId = null;
    let currentPage = 1;
    const perPage = 50;
    let totalPages = 1;
    let searchTimer = null;
    let editingWildcardId = null;
    let allCategories = [];

    // --- DOM refs ---
    const catList = document.getElementById('cat-list');
    const catSearch = document.getElementById('cat-search');
    const wcTbody = document.getElementById('wc-tbody');
    const wcSearch = document.getElementById('wc-search');
    const statusFilter = document.getElementById('wc-status-filter');
    const selectAll = document.getElementById('select-all');
    const wcCountLabel = document.getElementById('wc-count-label');
    const selectedCountLabel = document.getElementById('selected-count-label');
    const pagination = document.getElementById('wc-pagination');
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));

    // --- Toast helper ---
    function toast(msg, type = 'success') {
        const el = document.createElement('div');
        el.className = `alert alert-${type} position-fixed bottom-0 end-0 m-3`;
        el.style.zIndex = 9999;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    // --- API helpers ---
    const api = (url, opts = {}) => fetch(url, {
        headers: {'Content-Type': 'application/json'},
        ...opts
    });

    // --- Categories ---
    async function loadCategories() {
        const r = await api('/api/categories');
        allCategories = await r.json();
        renderCategories(allCategories);
    }

    function renderCategories(cats) {
        const q = catSearch.value.toLowerCase();
        const filtered = q ? cats.filter(c =>
            (c.display_name || c.name).toLowerCase().includes(q) || c.name.toLowerCase().includes(q)
        ) : cats;

        catList.innerHTML = filtered.length === 0
            ? '<div class="text-muted small p-2">無分類</div>'
            : filtered.map(c => `
                <div class="cat-item ${c.id === selectedCategoryId ? 'active' : ''}" data-id="${c.id}" data-name="${c.name}" data-display="${c.display_name || c.name}">
                    <span class="text-truncate" style="max-width:130px;" title="${c.display_name || c.name}">${c.display_name || c.name}</span>
                    <div class="d-flex align-items-center gap-1">
                        <span class="badge bg-secondary">${c.wildcard_count ?? 0}</span>
                    </div>
                </div>`).join('');

        catList.querySelectorAll('.cat-item').forEach(el => {
            el.addEventListener('click', () => selectCategory(parseInt(el.dataset.id), el.dataset.display));
        });
    }

    function selectCategory(id, name) {
        selectedCategoryId = id;
        currentPage = 1;
        renderCategories(allCategories);
        document.getElementById('cat-selected-name').textContent = name;
        document.getElementById('cat-selected-actions').style.display = 'block';
        loadWildcards();
    }

    catSearch.addEventListener('input', () => renderCategories(allCategories));

    // New category
    document.getElementById('btn-new-cat').addEventListener('click', () => {
        document.getElementById('new-cat-form').style.display = 'block';
        document.getElementById('new-cat-name').focus();
    });
    document.getElementById('btn-cancel-cat').addEventListener('click', () => {
        document.getElementById('new-cat-form').style.display = 'none';
    });
    document.getElementById('new-cat-name').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btn-save-cat').click();
        if (e.key === 'Escape') document.getElementById('btn-cancel-cat').click();
    });
    document.getElementById('btn-save-cat').addEventListener('click', async () => {
        const name = document.getElementById('new-cat-name').value.trim();
        const display = document.getElementById('new-cat-display').value.trim() || name;
        if (!name) return;
        const r = await api('/api/categories', {method: 'POST', body: JSON.stringify({name, display_name: display})});
        if (r.ok) {
            document.getElementById('new-cat-form').style.display = 'none';
            document.getElementById('new-cat-name').value = '';
            document.getElementById('new-cat-display').value = '';
            await loadCategories();
            toast('分類已新增');
        } else {
            const e = await r.json();
            toast(e.error || '新增失敗', 'danger');
        }
    });

    // Rename category
    document.getElementById('btn-rename-cat').addEventListener('click', async () => {
        if (!selectedCategoryId) return;
        const cat = allCategories.find(c => c.id === selectedCategoryId);
        const newDisplay = prompt('新顯示名稱：', cat?.display_name || cat?.name);
        if (!newDisplay) return;
        const r = await api(`/api/categories/${selectedCategoryId}`, {
            method: 'PUT', body: JSON.stringify({display_name: newDisplay})
        });
        if (r.ok) { await loadCategories(); toast('已重新命名'); }
        else toast('改名失敗', 'danger');
    });

    // Delete category
    document.getElementById('btn-delete-cat').addEventListener('click', async () => {
        if (!selectedCategoryId) return;
        const cat = allCategories.find(c => c.id === selectedCategoryId);
        const count = cat?.wildcard_count ?? '?';
        if (!confirm(`確定刪除「${cat?.display_name || cat?.name}」？\n這將刪除其中 ${count} 個 wildcard。`)) return;
        const r = await api(`/api/categories/${selectedCategoryId}`, {method: 'DELETE'});
        if (r.ok) {
            selectedCategoryId = null;
            document.getElementById('cat-selected-actions').style.display = 'none';
            wcTbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">請從左側選擇分類</td></tr>';
            pagination.innerHTML = '';
            await loadCategories();
            toast('分類已刪除');
        } else toast('刪除失敗', 'danger');
    });

    // --- Wildcards ---
    async function loadWildcards() {
        if (!selectedCategoryId) return;
        const search = wcSearch.value;
        const status = statusFilter.value;
        const params = new URLSearchParams({
            category_id: selectedCategoryId,
            page: currentPage,
            per_page: perPage,
        });
        if (search) params.set('search', search);
        if (status !== '') params.set('is_active', status);

        const r = await api(`/api/wildcards?${params}`);
        const data = await r.json();
        totalPages = data.pages || 1;
        wcCountLabel.textContent = `共 ${data.total} 筆`;
        renderWildcards(data.items);
        renderPagination(data.total, data.pages);
    }

    function renderWildcards(items) {
        selectAll.checked = false;
        selectedCountLabel.style.display = 'none';
        if (items.length === 0) {
            wcTbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">此分類無 Wildcard</td></tr>';
            return;
        }
        wcTbody.innerHTML = items.map(w => `
            <tr class="wildcard-row" data-id="${w.id}">
                <td><input type="checkbox" class="form-check-input wc-check" value="${w.id}"></td>
                <td class="content-cell">${escHtml(w.content)}</td>
                <td class="content-cell text-muted">${escHtml(w.content_zh || '')}</td>
                <td>
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input status-toggle" type="checkbox" ${w.is_active ? 'checked' : ''} data-id="${w.id}">
                    </div>
                </td>
                <td>
                    <div class="dropdown">
                        <button class="btn btn-sm btn-light" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" data-action="edit-content" data-id="${w.id}" data-content="${escAttr(w.content)}" data-zh="${escAttr(w.content_zh || '')}"><i class="bi bi-pencil"></i> 編輯</a></li>
                            <li><a class="dropdown-item" href="#" data-action="translate" data-id="${w.id}"><i class="bi bi-translate"></i> 翻譯</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" data-action="delete" data-id="${w.id}"><i class="bi bi-trash"></i> 刪除</a></li>
                        </ul>
                    </div>
                </td>
            </tr>`).join('');

        // Checkbox events
        wcTbody.querySelectorAll('.wc-check').forEach(cb => {
            cb.addEventListener('change', updateSelectedCount);
        });

        // Status toggle
        wcTbody.querySelectorAll('.status-toggle').forEach(sw => {
            sw.addEventListener('change', async e => {
                const id = parseInt(e.target.dataset.id);
                const r = await api(`/api/wildcards/${id}`, {
                    method: 'PUT', body: JSON.stringify({is_active: e.target.checked})
                });
                if (!r.ok) { e.target.checked = !e.target.checked; toast('狀態更新失敗', 'danger'); }
            });
        });

        // Dropdown actions
        wcTbody.querySelectorAll('[data-action]').forEach(el => {
            el.addEventListener('click', async e => {
                e.preventDefault();
                const action = el.dataset.action;
                const id = parseInt(el.dataset.id);
                if (action === 'edit-content') openEditModal(id, el.dataset.content, el.dataset.zh);
                else if (action === 'translate') await translateOne(id);
                else if (action === 'delete') await deleteOne(id);
            });
        });
    }

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function escAttr(s) { return s.replace(/"/g, '&quot;'); }

    function updateSelectedCount() {
        const checked = wcTbody.querySelectorAll('.wc-check:checked').length;
        if (checked > 0) {
            selectedCountLabel.textContent = `已選 ${checked} 筆`;
            selectedCountLabel.style.display = '';
        } else {
            selectedCountLabel.style.display = 'none';
        }
    }

    // Select all
    selectAll.addEventListener('change', e => {
        wcTbody.querySelectorAll('.wc-check').forEach(cb => cb.checked = e.target.checked);
        updateSelectedCount();
    });

    function getSelectedIds() {
        return [...wcTbody.querySelectorAll('.wc-check:checked')].map(cb => parseInt(cb.value));
    }

    // Pagination
    function renderPagination(total, pages) {
        if (pages <= 1) { pagination.innerHTML = ''; return; }
        let html = '<ul class="pagination pagination-sm">';
        html += `<li class="page-item ${currentPage===1?'disabled':''}"><a class="page-link" href="#" data-page="${currentPage-1}">«</a></li>`;
        for (let i = 1; i <= pages; i++) {
            if (pages > 10 && Math.abs(i - currentPage) > 3 && i !== 1 && i !== pages) {
                if (i === currentPage - 4 || i === currentPage + 4) html += '<li class="page-item disabled"><span class="page-link">…</span></li>';
                continue;
            }
            html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
        }
        html += `<li class="page-item ${currentPage===pages?'disabled':''}"><a class="page-link" href="#" data-page="${currentPage+1}">»</a></li>`;
        html += '</ul>';
        pagination.innerHTML = html;
        pagination.querySelectorAll('[data-page]').forEach(a => {
            a.addEventListener('click', e => {
                e.preventDefault();
                const p = parseInt(a.dataset.page);
                if (p >= 1 && p <= totalPages) { currentPage = p; loadWildcards(); }
            });
        });
    }

    // Search / filter debounce
    let debounceTimer;
    const debounce = fn => { clearTimeout(debounceTimer); debounceTimer = setTimeout(fn, 300); };
    wcSearch.addEventListener('input', () => { currentPage = 1; debounce(loadWildcards); });
    statusFilter.addEventListener('change', () => { currentPage = 1; loadWildcards(); });

    // Edit modal
    function openEditModal(id, content, zh) {
        editingWildcardId = id;
        document.getElementById('edit-content').value = content;
        document.getElementById('edit-content-zh').value = zh;
        editModal.show();
    }
    document.getElementById('btn-save-edit').addEventListener('click', async () => {
        if (!editingWildcardId) return;
        const r = await api(`/api/wildcards/${editingWildcardId}`, {
            method: 'PUT',
            body: JSON.stringify({
                content: document.getElementById('edit-content').value,
                content_zh: document.getElementById('edit-content-zh').value
            })
        });
        if (r.ok) { editModal.hide(); loadWildcards(); toast('已儲存'); }
        else toast('儲存失敗', 'danger');
    });

    // Single translate
    async function translateOne(id) {
        toast('翻譯中...', 'info');
        const r = await api(`/api/wildcards/${id}/translate`, {method: 'POST'});
        if (r.ok) { loadWildcards(); toast('翻譯完成'); }
        else { const e = await r.json(); toast(e.error || '翻譯失敗', 'danger'); }
    }

    // Delete single
    async function deleteOne(id) {
        if (!confirm('確定刪除此 Wildcard？')) return;
        const r = await api(`/api/wildcards/${id}`, {method: 'DELETE'});
        if (r.ok) { loadWildcards(); toast('已刪除'); }
        else toast('刪除失敗', 'danger');
    }

    // Batch ops
    async function batchOp(url, body, successMsg) {
        const ids = getSelectedIds();
        if (ids.length === 0) { toast('請先選擇 Wildcard', 'warning'); return; }
        const r = await api(url, {method: 'POST', body: JSON.stringify({ids, ...body})});
        if (r.ok) { loadWildcards(); toast(successMsg); }
        else { const e = await r.json(); toast(e.error || '操作失敗', 'danger'); }
    }
    document.getElementById('bulk-enable').addEventListener('click', e => { e.preventDefault(); batchOp('/api/wildcards/batch-update-active', {is_active: true}, '已批量啟用'); });
    document.getElementById('bulk-disable').addEventListener('click', e => { e.preventDefault(); batchOp('/api/wildcards/batch-update-active', {is_active: false}, '已批量停用'); });
    document.getElementById('bulk-translate').addEventListener('click', e => { e.preventDefault(); batchOp('/api/wildcards/batch-translate', {}, '批量翻譯完成'); });
    document.getElementById('bulk-delete').addEventListener('click', async e => {
        e.preventDefault();
        const ids = getSelectedIds();
        if (ids.length === 0) { toast('請先選擇 Wildcard', 'warning'); return; }
        if (!confirm(`確定刪除選中的 ${ids.length} 個 Wildcard？`)) return;
        await batchOp('/api/wildcards/batch-delete', {}, `已刪除 ${ids.length} 個`);
    });

    // Init
    loadCategories();
})();
</script>
{% endblock %}
