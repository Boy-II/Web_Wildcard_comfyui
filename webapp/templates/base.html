<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wildcard 管理系統{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-stars"></i> Wildcard 管理系統
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-house-door"></i> 首頁
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/wildcards">
                            <i class="bi bi-list-ul"></i> Wildcard 列表
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/prompt-builder">
                            <i class="bi bi-pencil-square"></i> 提示詞構建器
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/categories">
                            <i class="bi bi-folder"></i> 類別管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/import">
                            <i class="bi bi-upload"></i> 匯入資料
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/export">
                            <i class="bi bi-download"></i> 匯出資料
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/comfy-monitor">
                            <i class="bi bi-folder-fill"></i> ComfyUI 監視
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/translation-settings">
                            <i class="bi bi-gear-fill"></i> 翻譯設定
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
