{% extends "base.html" %}

{% block title %}首頁 - Wildcard 管理系統{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1 class="mb-1"><i class="bi bi-stars"></i> Wildcard 管理系統</h1>
        <p class="text-muted">ComfyUI AdaptivePrompts Wildcard 管理工具</p>
    </div>
</div>

<!-- Stats Row -->
<div class="row g-3 mb-4" id="stats-cards">
    <div class="col-md-4">
        <div class="card text-white bg-primary h-100">
            <div class="card-body text-center py-4">
                <i class="bi bi-collection fs-2 mb-2"></i>
                <h2 class="mb-0" id="total-wildcards">-</h2>
                <div class="mt-1 opacity-75">總 Wildcard 數</div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-success h-100">
            <div class="card-body text-center py-4">
                <i class="bi bi-check-circle fs-2 mb-2"></i>
                <h2 class="mb-0" id="active-wildcards">-</h2>
                <div class="mt-1 opacity-75">已啟用</div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-info h-100">
            <div class="card-body text-center py-4">
                <i class="bi bi-folder2-open fs-2 mb-2"></i>
                <h2 class="mb-0" id="total-categories">-</h2>
                <div class="mt-1 opacity-75">分類數</div>
            </div>
        </div>
    </div>
</div>

<!-- Quick Jump -->
<div class="row g-2 mb-4">
    <div class="col-auto">
        <a href="/wildcards" class="btn btn-outline-primary btn-lg">
            <i class="bi bi-list-ul"></i> Wildcard 管理
        </a>
    </div>
    <div class="col-auto">
        <a href="/import" class="btn btn-outline-secondary btn-lg">
            <i class="bi bi-upload"></i> 匯入資料
        </a>
    </div>
    <div class="col-auto">
        <a href="/export" class="btn btn-outline-secondary btn-lg">
            <i class="bi bi-download"></i> 匯出資料
        </a>
    </div>
    <div class="col-auto">
        <a href="/translation-settings" class="btn btn-outline-secondary btn-lg">
            <i class="bi bi-gear-fill"></i> 翻譯設定
        </a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const data = await fetch('/api/stats').then(r => r.json());
        document.getElementById('total-wildcards').textContent = data.total_wildcards.toLocaleString();
        document.getElementById('active-wildcards').textContent = data.active_wildcards.toLocaleString();
        document.getElementById('total-categories').textContent = data.total_categories.toLocaleString();
    } catch (e) {
        console.error('載入統計失敗', e);
    }
});
</script>
{% endblock %}
